{{- if .Values.mailcow.enabled }}
apiVersion: mailcow.onestein.nl/v1
kind: Alias
metadata:
  name: mailcow-alias
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  mailcow: {{ include "curq.fullname" . }}
  address: {{ printf "@%s" .Values.mailcow.domain | quote }} # Catch-all alias
  goTo: {{ printf "catchall@%s" .Values.mailcow.domain | quote }}
{{- end }}
