{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "curq.fullname" . }}-postgres
  labels:
    {{- include "curq.labels" . | nindent 4 }}
spec:
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  selector:
    name: {{ include "curq.fullname" . }}-postgres
{{- end }}
