# Default values for curq.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/onesteinbv/curq
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

securityContext:
  fsGroup: 999
  runAsGroup: 999
  runAsUser: 999

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  http: 8069
  websocket: 8072

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# This is to setup the readiness and startup probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  failureThreshold: 6
  periodSeconds: 10
  timeoutSeconds: 3
  httpGet:
    path: /web/health
    port: http
startupProbe:
  failureThreshold: 180
  periodSeconds: 10
  timeoutSeconds: 3
  httpGet:
    path: /web/health
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
extraVolumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
extraVolumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 8Gi
  storageClass: ""
  existingClaim: ""

  s3:
    enabled: false
    create: false
    bucket: ""  # Override the bucket name

postgres:
  enabled: false
  auth:
    username: curq
    password: ""
    secret:
      create: true
      generate: true
      name: ""  # Override the secret name

externalPostgres:
  enabled: false
  secret: 
    name: ""  # Name of the secret containing the postgres connection information
    hostKey: "host"  # Key in the secret for the postgres host
    portKey: "port"  # Key in the secret for the postgres port
    usernameKey: "username"  # Key in the secret for the postgres username
    passwordKey: "password"  # Key in the secret for the postgres password

database:
  name: ""
  role: ""
  create:
    database: true
    role: true

outgoingMail:
  enabled: false
  host: ""
  port: 25
  secret:
    name: ""  # Name of the secret containing the SMTP credentials
    usernameKey: "username"  # Key in the secret for the SMTP username
    passwordKey: "password"  # Key in the secret for the SMTP password
  encryption: "none"  # Options are "none", "ssl", or "starttls"

incomingMail:
  enabled: false
  confirm: true
  host: ""
  type: "imap"
  port: 993
  ssl: true
  secret:
    name: ""  # Name of the secret containing the SMTP credentials
    usernameKey: "username"
    passwordKey: "password"

admin:
  update: false
  username: "admin"
  password: "admin"
  generate: false
  existingSecret: ""
  existingSecretKey: "password"

# This updates the base_customer_user.user_customer record. For more information, checkout: https://github.com/onesteinbv/addons-curq/blob/18.0/scripts/prepare_customer_user.py
user:
  update: false
  username: ""

# This updates the base.main_company record in the database with the provided values
company:
  update: false
  name: "My Company"
  email: "mycompany@example.com"
  coc: ""
  city: "My City"
  zip: ""
  street: ""

mailcow:
  enabled: false  # If enabled, CURQ will use the mailcow API to create a catch-all and configure it in CURQ
  endpoint: ""  # The endpoint for the mailcow API
  secret:
    name: ""  # Name of the secret containing the mailcow API token
    key: "token"
  extraMailboxes: []
  admins: []

keycloak:
  enabled: false
  endpoint: ""
  realm: "master"
  secret:
    name: ""  # Name of the secret containing the Keycloak client secret
    key: "clientSecret"

databaseManager:
  enabled: false
  generate: false
  password: "admin"
  existingSecret: ""
  existingSecretKey: "password"
  filter: ".*"

extraEnv: []
additionalConfig: ""

# This is the essentials bundle, look in https://github.com/onesteinbv/addons-curq for more modules / bundles that can be added here.
modules: ["container_install"]

# If true, modules outside of the onces specified in the bundles will be uninstalled, if false, they will be left as is.
uninstallModules: false