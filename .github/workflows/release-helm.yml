name: Release Helm Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3.1.0
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3.4
        with:
          version: v3.19.0

      - name: Install yq
        run: |
          # Install yq for YAML parsing
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Add Helm repositories
        run: |
          set -euo pipefail
          for chart in $(find . -name "Chart.yaml" -exec dirname {} \;); do
            repos=$(yq -r '.dependencies[]?.repository | select(test("^https?://"))' "$chart/Chart.yaml")
            for repo in $repos; do
              repo_name=$(basename "$repo")
              helm repo add "$repo_name" "$repo" --force-update
            done
          done

      - name: Lint Helm Charts
        run: |
          set -euo pipefail
          for chart in $(find . -name "Chart.yaml" -exec dirname {} \;); do 
            helm dependency build "$chart" && helm lint "$chart"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NAME_TEMPLATE: "helm-{{ .Name }}-{{ .Version }}"
          CR_SKIP_EXISTING: "true"
